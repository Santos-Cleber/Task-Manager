<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>

  <body>
    <header class="header">
      <h1 class="header__title">Task Manager</h1>
      <p class="header__subtitle">Organize suas tarefas do dia a dia</p>
    </header>

    <main class="container">
      <section class="task-form">
        <input
          type="text"
          id="taskInput"
          class="task-form__input"
          placeholder="Digite uma nova tarefa..."
        />
        <button id="addTaskBtn" class="task-form__button">+ Adicionar</button>
      </section>

      <section class="task-list">
        <ul id="taskList" class="task-list__ul">
          <!-- As tarefas serão inseridas aqui pelo JavaScript -->
        </ul>
        <p id="emptyMessage" class="task-list__empty">
          Nenhuma tarefa encontrada. Adicione uma acima! 👆
        </p>
      </section>

      <section class="task-filters">
        <button
          class="task-filters__btn task-filters__btn--active"
          data-filter="all"
        >
          Todas
        </button>
        <button class="task-filters__btn" data-filter="active">Ativas</button>
        <button class="task-filters__btn" data-filter="completed">
          Concluídas
        </button>
      </section>

      <footer class="task-footer">
        <p class="task-footer__count">
          Tarefas restantes: <span id="taskCount">0</span>
        </p>
        <button id="clearCompletedBtn" class="task-footer__clear">
          Limpar concluídas
        </button>
      </footer>
    </main>

    <script src="src/js/storage.js"></script>
    <script src="src/js/tasks.js"></script>
    <script src="src/js/app.js"></script>
  </body>
</html>
